<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO LIST</title>

    <link rel="stylesheet" href="style.css">

    <div class = "container">
        <header class = "header">
            <h1>Vox-Tasks AI</h1>
            <p class="subtitle">Stay Prodective! One task at a time</p>
        </header>


    <div class="input-section">
        <input  type="text" 
                id = "task-Input"
                class = "input" 
                placeholder = "Add a new task..."
                autocomplete="off"
        >   
        <button id="mic-Btn" class="startBtn">🎤</button>

        <button id="add-Btn" class="addButton">Add Task</button> 
       
    </div>
    

    <ul id="task-List" class="task-list">
        <!-- To-Do's will be added here -->
    </ul>

    <div class="counter">
    <span class="Total-tasks">Total: 0</span>
    <span class="Complete-tasks">Complete: 0</span>
    </div>

    <div class="empty-state" id="empty-State">
        <p>No tasks yet. Add one to get started! 🚀</p>
    </div>

    <div >
        <button class="clear" id="clear-Btn" type="button">Clear All Tasks</button>
    </div>
   
    <script src="script.js"></script>
    </div>
</html>
